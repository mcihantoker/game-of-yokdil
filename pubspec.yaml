name: yokdil_quest
description: "YÖKDİL Quest — Oyunlaştırılmış YÖKDİL kelime öğrenme uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigasyon
  go_router: ^14.0.0

  # State management
  provider: ^6.1.2

  # Yerel depolama (SM-2 verisi + ilerleme)
  shared_preferences: ^2.3.0

  # Firebase (Auth + Firestore)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

  # Ödeme (RevenueCat)
  purchases_flutter: ^8.0.0

  # Yardımcılar
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
